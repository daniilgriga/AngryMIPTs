<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Play &mdash; AngryMipts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #0d1018;
  --bg2:   #141824;
  --bg3:   #1b2135;
  --amber: #f5a623;
  --coral: #e8835a;
  --text:  #ede8e0;
  --text2: #8a93a8;
  --text3: #4d566a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

/* GRAIN */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: 0.45;
}

/* TOP BAR */
#topbar {
  flex-shrink: 0;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(1rem, 3vw, 2.5rem);
  background: rgba(13,16,24,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  z-index: 100;
  position: relative;
}

.bar-left {
  display: flex; align-items: center; gap: 1.25rem;
}

.back-link {
  display: inline-flex; align-items: center; gap: 0.4rem;
  color: var(--text2); text-decoration: none;
  font-size: 0.82rem; font-weight: 500;
  padding: 0.4rem 0.75rem;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.03);
  transition: color 0.2s, background 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.back-link:hover {
  color: var(--text);
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.12);
}
.back-link svg { flex-shrink: 0; }

.bar-divider {
  width: 1px; height: 20px;
  background: rgba(255,255,255,0.08);
}

.bar-logo {
  font-family: 'Sora', sans-serif;
  font-weight: 800; font-size: 1.1rem;
  letter-spacing: -0.02em;
  color: var(--text);
  text-decoration: none;
}
.bar-logo span { color: var(--amber); }

.bar-right {
  display: flex; align-items: center; gap: 0.75rem;
}

#btn-fullscreen {
  display: inline-flex; align-items: center; gap: 0.45rem;
  background: rgba(245,166,35,0.1);
  border: 1px solid rgba(245,166,35,0.2);
  color: var(--amber);
  padding: 0.45rem 1rem;
  border-radius: 100px;
  font-family: 'Sora', sans-serif;
  font-size: 0.8rem; font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
  letter-spacing: 0.02em;
}
#btn-fullscreen:hover {
  background: rgba(245,166,35,0.18);
  box-shadow: 0 0 20px rgba(245,166,35,0.15);
  transform: translateY(-1px);
}
#btn-fullscreen:active { transform: translateY(0); }

/* MAIN STAGE */
#stage {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-height: 0;
}

/* SKY BACKGROUND */
#sky-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}

/* GAME WRAP */
#game-wrap {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  gap: 0;
}

#canvas-frame {
  position: relative;
  border-radius: 8px;
  box-shadow:
    0 0 0 1px rgba(245,166,35,0.2),
    0 0 60px rgba(245,166,35,0.12),
    0 0 120px rgba(245,166,35,0.05),
    0 32px 80px rgba(0,0,0,0.7);
  overflow: hidden;
}

#canvas {
  display: block;
  width: 1280px; height: 720px;
  max-width: calc(100vw - 2rem);
  background: #050810;
  border-radius: 8px;
  outline: none;
  image-rendering: auto;
}

/* LOADING OVERLAY */
#overlay {
  position: absolute; inset: 0;
  border-radius: 8px;
  background: rgba(8,10,18,0.97);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1.5rem;
  z-index: 10;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}
#overlay.hidden {
  opacity: 0; visibility: hidden; pointer-events: none;
}

.loader-logo {
  font-family: 'Sora', sans-serif; font-weight: 800;
  font-size: 2rem; letter-spacing: -0.04em;
  color: var(--text);
  animation: pulse-logo 2s ease-in-out infinite;
}
.loader-logo span { color: var(--amber); }

@keyframes pulse-logo {
  0%,100% { opacity: 0.6; }
  50%      { opacity: 1; }
}

.loader-ring {
  width: 44px; height: 44px;
  border: 2px solid rgba(245,166,35,0.15);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loader-status {
  font-size: 0.78rem; letter-spacing: 0.12em;
  color: var(--text3); text-transform: uppercase;
  font-weight: 500; font-family: 'Sora', sans-serif;
}

.loader-bar-wrap {
  width: 200px; height: 2px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px; overflow: hidden;
}
.loader-bar {
  height: 100%; width: 0%;
  background: var(--amber);
  border-radius: 2px;
  transition: width 0.4s ease;
  box-shadow: 0 0 8px rgba(245,166,35,0.6);
}

/* error details inside overlay */
#details {
  margin: 0; max-width: 80%;
  white-space: pre-wrap; word-break: break-word;
  font-size: 0.75rem; line-height: 1.4;
  color: #ffd9c8; text-align: center;
  display: none;
}
#details.visible { display: block; }

/* STATUS LINE */
#status-line {
  width: 100%;
  padding: 0.6rem 1rem;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(13,16,24,0.6);
  backdrop-filter: blur(8px);
  border-top: 1px solid rgba(255,255,255,0.04);
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text3);
  display: inline-block; margin-right: 0.5rem;
  transition: background 0.4s;
}
.status-dot.ready { background: #52b788; box-shadow: 0 0 6px rgba(82,183,136,0.5); }
.status-dot.loading { background: var(--amber); animation: blink 1.1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

#status-text {
  font-size: 0.72rem; color: var(--text3);
  font-weight: 500; letter-spacing: 0.05em;
  display: flex; align-items: center;
}
.status-right {
  font-size: 0.7rem; color: var(--text3);
  font-family: 'Sora', sans-serif; font-weight: 600;
  letter-spacing: 0.04em; opacity: 0.5;
}

/* FULLSCREEN */
:fullscreen #topbar,
:-webkit-full-screen #topbar { display: none; }
:fullscreen #stage,
:-webkit-full-screen #stage { height: 100vh; }
:fullscreen #canvas,
:-webkit-full-screen #canvas {
  width: 100vw !important;
  height: calc(100vw * 720 / 1280) !important;
  max-width: none !important;
}

/* RESPONSIVE */
@media (max-width: 1320px) {
  #canvas {
    width: calc(100vw - 2rem) !important;
    height: calc((100vw - 2rem) * 9/16) !important;
  }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="bar-left">
    <a href="../" class="back-link">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M8 2.5L4.5 6.5L8 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
    <div class="bar-divider"></div>
    <a href="../" class="bar-logo">Angry<span>Mipts</span></a>
  </div>
  <div class="bar-right">
    <button id="btn-fullscreen">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M1.5 4.5V1.5H4.5M8.5 1.5H11.5V4.5M11.5 8.5V11.5H8.5M4.5 11.5H1.5V8.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Fullscreen
    </button>
  </div>
</div>

<!-- MAIN STAGE -->
<div id="stage">
  <canvas id="sky-canvas"></canvas>

  <div id="game-wrap">
    <div id="canvas-frame">
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>

      <div id="overlay">
        <div class="loader-logo">Angry<span>Mipts</span></div>
        <div class="loader-ring"></div>
        <div class="loader-bar-wrap">
          <div class="loader-bar" id="loader-bar"></div>
        </div>
        <div class="loader-status" id="status">Preparing WebAssembly runtime&hellip;</div>
        <pre id="details"></pre>
      </div>
    </div>

    <div id="status-line">
      <div id="status-text">
        <span class="status-dot loading" id="status-dot"></span>
        <span id="status-msg">Loading game engine&hellip;</span>
      </div>
      <div class="status-right">angrymipts.ru</div>
    </div>
  </div>
</div>

<script>
// SKY BACKGROUND
const sky = document.getElementById('sky-canvas');
const skyCtx = sky.getContext('2d');
let skyW, skyH;

function resizeSky() {
  skyW = sky.width = sky.offsetWidth;
  skyH = sky.height = sky.offsetHeight;
}
resizeSky();
window.addEventListener('resize', resizeSky);

const STARS = Array.from({length: 180}, () => ({
  x: Math.random(), y: Math.random() * 0.75,
  r: Math.random() * 1.4 + 0.2,
  a: Math.random() * 0.6 + 0.1,
  twinkle: Math.random() * Math.PI * 2,
  speed: Math.random() * 1.5 + 0.5,
}));

const WISPS = Array.from({length: 6}, () => ({
  x: Math.random(), y: Math.random() * 0.65,
  rx: Math.random() * 0.15 + 0.08,
  ry: Math.random() * 0.06 + 0.03,
  hue: Math.random() > 0.5 ? [30,60,100] : [200,220,255],
  a: Math.random() * 0.04 + 0.01,
}));

let skyT = 0, lastSkyTs = null;

function drawSky(ts) {
  if (!lastSkyTs) lastSkyTs = ts;
  skyT += (ts - lastSkyTs) / 1000;
  lastSkyTs = ts;

  const g = skyCtx.createLinearGradient(0,0,0,skyH);
  g.addColorStop(0,    '#040810');
  g.addColorStop(0.35, '#0a1525');
  g.addColorStop(0.65, '#1a3a5c');
  g.addColorStop(0.85, '#1e2a18');
  g.addColorStop(1,    '#2d1a0a');
  skyCtx.fillStyle = g; skyCtx.fillRect(0,0,skyW,skyH);

  const hg = skyCtx.createRadialGradient(skyW*0.5,skyH*0.88,0,skyW*0.5,skyH*0.88,skyW*0.55);
  hg.addColorStop(0,'rgba(245,120,30,0.14)'); hg.addColorStop(0.5,'rgba(245,100,20,0.05)'); hg.addColorStop(1,'rgba(0,0,0,0)');
  skyCtx.fillStyle = hg; skyCtx.fillRect(0,0,skyW,skyH);

  const cg = skyCtx.createRadialGradient(skyW*0.3,skyH*0.2,0,skyW*0.3,skyH*0.2,skyW*0.4);
  cg.addColorStop(0,'rgba(50,100,200,0.07)'); cg.addColorStop(1,'rgba(0,0,0,0)');
  skyCtx.fillStyle = cg; skyCtx.fillRect(0,0,skyW,skyH);

  WISPS.forEach(w => {
    const wx = w.x*skyW, wy = w.y*skyH;
    const wg = skyCtx.createRadialGradient(wx,wy,0,wx,wy,w.rx*skyW);
    const [r,g2,b] = w.hue;
    wg.addColorStop(0,`rgba(${r},${g2},${b},${w.a})`); wg.addColorStop(1,'rgba(0,0,0,0)');
    skyCtx.save(); skyCtx.scale(1, w.ry/w.rx);
    skyCtx.fillStyle = wg; skyCtx.beginPath();
    skyCtx.arc(wx, wy/(w.ry/w.rx), w.rx*skyW, 0, Math.PI*2);
    skyCtx.fill(); skyCtx.restore();
  });

  STARS.forEach(s => {
    const alpha = s.a * (0.65 + 0.35*Math.sin(s.twinkle + skyT*s.speed));
    skyCtx.beginPath(); skyCtx.arc(s.x*skyW, s.y*skyH, s.r, 0, Math.PI*2);
    skyCtx.fillStyle = `rgba(220,230,255,${alpha})`; skyCtx.fill();
  });

  // Shooting star
  const stPhase = (skyT * 0.07) % 1;
  if (stPhase > 0.92) {
    const p = (stPhase - 0.92) / 0.08;
    const eased = p < 0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;
    const stX = skyW*(0.15 + eased*0.55), stY = skyH*(0.05 + eased*0.25);
    const tailLen = 80*Math.sin(p*Math.PI);
    const stg = skyCtx.createLinearGradient(stX-tailLen, stY-tailLen*0.4, stX, stY);
    stg.addColorStop(0,'rgba(255,240,200,0)');
    stg.addColorStop(1,`rgba(255,240,200,${0.7*Math.sin(p*Math.PI)})`);
    skyCtx.strokeStyle = stg; skyCtx.lineWidth = 1.2;
    skyCtx.beginPath(); skyCtx.moveTo(stX-tailLen, stY-tailLen*0.4); skyCtx.lineTo(stX,stY); skyCtx.stroke();
  }

  // Hills
  skyCtx.beginPath();
  skyCtx.moveTo(0,skyH);
  skyCtx.bezierCurveTo(skyW*0.12,skyH*0.78,skyW*0.28,skyH*0.74,skyW*0.4,skyH*0.82);
  skyCtx.bezierCurveTo(skyW*0.52,skyH*0.90,skyW*0.65,skyH*0.80,skyW*0.78,skyH*0.84);
  skyCtx.bezierCurveTo(skyW*0.88,skyH*0.88,skyW*0.95,skyH*0.82,skyW,skyH*0.85);
  skyCtx.lineTo(skyW,skyH); skyCtx.closePath();
  const hg2 = skyCtx.createLinearGradient(0,skyH*0.74,0,skyH);
  hg2.addColorStop(0,'#0e1a09'); hg2.addColorStop(1,'#070d05');
  skyCtx.fillStyle = hg2; skyCtx.fill();

  skyCtx.beginPath();
  skyCtx.moveTo(0,skyH);
  skyCtx.bezierCurveTo(skyW*0.05,skyH*0.87,skyW*0.2,skyH*0.85,skyW*0.38,skyH*0.9);
  skyCtx.bezierCurveTo(skyW*0.55,skyH*0.95,skyW*0.72,skyH*0.88,skyW,skyH*0.92);
  skyCtx.lineTo(skyW,skyH); skyCtx.closePath();
  const hg3 = skyCtx.createLinearGradient(0,skyH*0.85,0,skyH);
  hg3.addColorStop(0,'#111f0c'); hg3.addColorStop(1,'#080e06');
  skyCtx.fillStyle = hg3; skyCtx.fill();

  requestAnimationFrame(drawSky);
}
requestAnimationFrame(drawSky);

// WASM / EMSCRIPTEN INTEGRATION
const canvasEl   = document.getElementById('canvas');
const overlayEl  = document.getElementById('overlay');
const statusEl   = document.getElementById('status');
const detailsEl  = document.getElementById('details');
const loaderBar  = document.getElementById('loader-bar');
const statusDot  = document.getElementById('status-dot');
const statusMsg  = document.getElementById('status-msg');

function focusCanvas() {
  if (canvasEl && typeof canvasEl.focus === 'function') {
    canvasEl.focus({ preventScroll: true });
  }
}

function setFatal(message, details) {
  statusEl.textContent = message;
  statusMsg.textContent = message;
  if (details) { detailsEl.textContent = details; detailsEl.classList.add('visible'); }
  overlayEl.classList.remove('hidden');
  statusDot.classList.remove('loading', 'ready');
}

const backendUrl = 'https://api.angrymipts.ru';

var Module = {
  canvas: canvasEl,
  ENV: { ANGRY_BACKEND_URL: backendUrl },
  preRun: [],
  postRun: [],
  onAbort: function(reason) {
    setFatal('Runtime aborted', String(reason || 'unknown reason'));
  },
  printErr: function(text) {
    if (!text) return;
    detailsEl.textContent = String(text);
    detailsEl.classList.add('visible');
  },
  setStatus: function(text) {
    if (!text) return;
    statusEl.textContent = text;
    statusMsg.textContent = text;
    // Approximate progress from Emscripten status strings
    const m = text.match(/(\d+)\/(\d+)/);
    if (m) {
      loaderBar.style.width = Math.round(parseInt(m[1]) / parseInt(m[2]) * 100) + '%';
    }
  },
  monitorRunDependencies: function(left) {
    if (left > 0) {
      const msg = 'Loading assets… ' + left + ' remaining';
      statusEl.textContent = msg; statusMsg.textContent = msg;
    } else {
      const msg = 'Starting game…';
      statusEl.textContent = msg; statusMsg.textContent = msg;
      loaderBar.style.width = '95%';
    }
  },
  onRuntimeInitialized: function() {
    loaderBar.style.width = '100%';
    statusMsg.textContent = 'Game running';
    setTimeout(() => {
      overlayEl.classList.add('hidden');
      statusDot.classList.remove('loading');
      statusDot.classList.add('ready');
      focusCanvas();
    }, 400);
  }
};

// Polyfill: Raylib calls deprecated Element.setCapture()
if (!Element.prototype.setCapture) {
  Element.prototype.setCapture = function() {};
}

canvasEl.addEventListener('pointerdown', function(e) {
  focusCanvas();
  canvasEl.setPointerCapture(e.pointerId);
});

// FULLSCREEN
const fsBtn = document.getElementById('btn-fullscreen');
const fsIconExpand = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1.5 4.5V1.5H4.5M8.5 1.5H11.5V4.5M11.5 8.5V11.5H8.5M4.5 11.5H1.5V8.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Fullscreen`;
const fsIconCollapse = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M4.5 1.5H1.5V4.5M11.5 4.5V1.5H8.5M8.5 11.5H11.5V8.5M1.5 8.5V11.5H4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Exit Full`;

function requestFullscreenSafe() {
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    return;
  }
  if (typeof Module !== 'undefined' && Module.requestFullscreen) {
    Module.requestFullscreen(false, true);
  } else {
    const el = document.documentElement;
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  }
}

function onFullscreenChange() {
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  fsBtn.innerHTML = isFs ? fsIconCollapse : fsIconExpand;
  focusCanvas();
  if (!isFs) {
    canvasEl.width = 1280;
    canvasEl.height = 720;
  }
}

fsBtn.addEventListener('click', requestFullscreenSafe);
document.addEventListener('fullscreenchange', onFullscreenChange);
document.addEventListener('webkitfullscreenchange', onFullscreenChange);

window.addEventListener('keydown', function(e) {
  if (e.key === 'F11' || (e.key === 'Enter' && e.altKey)) {
    e.preventDefault(); requestFullscreenSafe();
  }
});

// ERROR HANDLING
window.addEventListener('error', function(event) {
  const target = event.target || event.srcElement;
  if (target && target !== window) {
    const url = String(target.src || target.href || '');
    if (!/AngryMipts\.(js|wasm|data)(\?|$)/i.test(url)) return;
    setFatal('Core resource load error', url || 'unknown resource');
    return;
  }
  const info = [
    event.message || 'unknown error',
    event.filename ? ('file: ' + event.filename) : '',
    event.lineno   ? ('line: ' + event.lineno + ':' + (event.colno || 0)) : ''
  ].filter(Boolean).join('\n');
  setFatal('Runtime error', info || 'unknown runtime error');
});

window.addEventListener('unhandledrejection', function(event) {
  setFatal('Unhandled rejection', event.reason ? String(event.reason) : 'unknown');
});
</script>
{{{ SCRIPT }}}
</body>
</html>
